<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Trailer Hub</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .auth-error {
      background: rgba(255, 80, 80, 0.12);
      border: 1px solid rgba(255, 80, 80, 0.35);
      color: #ff6b6b;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 12px;
      display: none;
    }
    .auth-error.show { display: block; }
    .auth-success {
      background: rgba(50, 200, 100, 0.12);
      border: 1px solid rgba(50, 200, 100, 0.35);
      color: #4ade80;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 12px;
      display: none;
    }
    .auth-success.show { display: block; }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: btnSpin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes btnSpin { to { transform: rotate(360deg); } }
    .password-strength {
      height: 3px;
      border-radius: 2px;
      margin-top: 6px;
      transition: width .3s, background .3s;
      width: 0;
    }
  </style>
</head>
<body>
  <section class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="logo">TRAILER HUB</a>
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-sub">Join to unlock Tonight Picks, Recently Viewed, and saved favorites.</p>

      <div class="auth-error"   id="reg-error"></div>
      <div class="auth-success" id="reg-success"></div>

      <form id="register-form" class="auth-form">
        <input id="reg-email"    class="form-input" type="email"    placeholder="Email"            required autocomplete="email">
        <div>
          <input id="reg-password" class="form-input" type="password" placeholder="Password (min 6 chars)" required minlength="6" autocomplete="new-password">
          <div class="password-strength" id="pwd-strength"></div>
        </div>
        <input id="reg-confirm"  class="form-input" type="password" placeholder="Confirm Password" required minlength="6" autocomplete="new-password">
        <button class="submit-btn" type="submit" id="reg-btn">Create Account</button>
      </form>

      <button class="btn-pill auth-guest-btn" id="browse-guest-register" type="button">Browse as Guest</button>
      <p class="auth-switch">Already have an account? <a href="login.html">Login</a></p>
    </div>
  </section>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>
  <script>
    function showError(msg) {
      const el = document.getElementById('reg-error');
      el.textContent = msg;
      el.classList.add('show');
      document.getElementById('reg-success').classList.remove('show');
    }
    function showSuccess(msg) {
      const el = document.getElementById('reg-success');
      el.textContent = msg;
      el.classList.add('show');
      document.getElementById('reg-error').classList.remove('show');
    }
    function hideMessages() {
      document.getElementById('reg-error').classList.remove('show');
      document.getElementById('reg-success').classList.remove('show');
    }
    function setLoading(loading) {
      const btn = document.getElementById('reg-btn');
      btn.disabled = loading;
      btn.innerHTML = loading
        ? '<span class="btn-spinner"></span>Creating account…'
        : 'Create Account';
    }

    function friendlyError(code) {
      const map = {
        'auth/email-already-in-use':  'An account with this email already exists.',
        'auth/invalid-email':         'Please enter a valid email address.',
        'auth/weak-password':         'Password is too weak. Use at least 6 characters.',
        'auth/network-request-failed':'Network error. Check your connection.',
      };
      return map[code] || 'Something went wrong. Please try again.';
    }

    /* Password strength indicator */
    document.getElementById('reg-password').addEventListener('input', (e) => {
      const val = e.target.value;
      const bar = document.getElementById('pwd-strength');
      let strength = 0;
      if (val.length >= 6)  strength++;
      if (val.length >= 10) strength++;
      if (/[A-Z]/.test(val)) strength++;
      if (/[0-9]/.test(val)) strength++;
      if (/[^A-Za-z0-9]/.test(val)) strength++;
      const colors = ['', '#ef4444', '#f97316', '#eab308', '#22c55e', '#16a34a'];
      const widths = ['0%', '20%', '40%', '60%', '80%', '100%'];
      bar.style.width      = widths[strength] || '0%';
      bar.style.background = colors[strength] || 'transparent';
    });

    /* ── Register ── */
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      const email = document.getElementById('reg-email').value.trim();
      const pass  = document.getElementById('reg-password').value;
      const conf  = document.getElementById('reg-confirm').value;

      if (pass !== conf) { showError('Passwords do not match.'); return; }
      if (pass.length < 6) { showError('Password must be at least 6 characters.'); return; }

      setLoading(true);
      try {
        const cred = await firebase.auth().createUserWithEmailAndPassword(email, pass);
        TrailerAuth.setUser(cred.user.email, 'email');
        showSuccess('Account created! Redirecting…');
        setTimeout(() => { location.href = 'index.html'; }, 1200);
      } catch (err) {
        showError(friendlyError(err.code));
        setLoading(false);
      }
    });

    /* ── Guest ── */
    document.getElementById('browse-guest-register').addEventListener('click', () => {
      TrailerAuth.setGuest();
      location.href = 'index.html';
    });

    /* ── Redirect if already logged in ── */
    firebase.auth().onAuthStateChanged(user => {
      if (user) {
        TrailerAuth.setUser(user.email, user.providerData?.[0]?.providerId || 'email');
        location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
