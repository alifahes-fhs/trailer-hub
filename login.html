<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Trailer Hub</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .auth-error {
      background: rgba(255, 80, 80, 0.12);
      border: 1px solid rgba(255, 80, 80, 0.35);
      color: #ff6b6b;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 12px;
      display: none;
    }
    .auth-error.show { display: block; }
    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .btn-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: btnSpin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes btnSpin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <section class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="logo">TRAILER HUB</a>
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-sub">Login to unlock Tonight Picks, Recently Viewed, and saved favorites.</p>

      <div class="auth-error" id="login-error"></div>

      <form id="login-form" class="auth-form">
        <input id="login-email" class="form-input" type="email" placeholder="Email" required autocomplete="email">
        <input id="login-password" class="form-input" type="password" placeholder="Password" required autocomplete="current-password">
        <button class="submit-btn" type="submit" id="login-btn">Login</button>
      </form>

      <div class="auth-social">
        <button class="btn-pill auth-social-btn" id="login-google" type="button">
          <svg width="16" height="16" viewBox="0 0 48 48" style="vertical-align:middle;margin-right:6px"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.8 2.5 30.3 0 24 0 14.7 0 6.7 5.4 2.8 13.3l7.9 6.1C12.6 13.1 17.9 9.5 24 9.5z"/><path fill="#4285F4" d="M46.6 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.2-10.1 7.2-17z"/><path fill="#FBBC05" d="M10.7 28.6A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.7-4.6L2.3 13.3A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.8 10.7l7.9-6.1z"/><path fill="#34A853" d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-7.5-5.8c-2.1 1.4-4.8 2.2-8.4 2.2-6.1 0-11.3-3.6-13.3-9l-7.9 6.1C6.7 42.6 14.7 48 24 48z"/></svg>
          Continue with Google
        </button>
      </div>

      <button class="btn-pill auth-guest-btn" id="browse-guest-login" type="button">Browse as Guest</button>
      <p class="auth-switch">No account? <a href="register.html">Create one</a></p>
    </div>
  </section>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>
  <script>
    /* ── helpers ── */
    function showError(msg) {
      const el = document.getElementById('login-error');
      el.textContent = msg;
      el.classList.add('show');
    }
    function hideError() {
      document.getElementById('login-error').classList.remove('show');
    }
    function setLoading(loading) {
      const btn = document.getElementById('login-btn');
      btn.disabled = loading;
      btn.innerHTML = loading
        ? '<span class="btn-spinner"></span>Logging in…'
        : 'Login';
    }

    /* Friendly Firebase error messages */
    function friendlyError(code) {
      const map = {
        'auth/user-not-found':      'No account found with this email.',
        'auth/wrong-password':      'Incorrect password. Please try again.',
        'auth/invalid-email':       'Please enter a valid email address.',
        'auth/too-many-requests':   'Too many attempts. Please wait a moment.',
        'auth/network-request-failed': 'Network error. Check your connection.',
        'auth/invalid-credential':  'Incorrect email or password.',
        'auth/popup-closed-by-user':'Google sign-in was cancelled.',
      };
      return map[code] || 'Something went wrong. Please try again.';
    }

    /* ── Email/Password Login ── */
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      const email = document.getElementById('login-email').value.trim();
      const pwd   = document.getElementById('login-password').value;
      if (!email || !pwd) return;

      setLoading(true);
      try {
        const cred = await firebase.auth().signInWithEmailAndPassword(email, pwd);
        TrailerAuth.setUser(cred.user.email, 'email');
        location.href = 'index.html';
      } catch (err) {
        showError(friendlyError(err.code));
        setLoading(false);
      }
    });

    /* ── Google Login ── */
    document.getElementById('login-google').addEventListener('click', async () => {
      hideError();
      try {
        const provider = new firebase.auth.GoogleAuthProvider();
        const cred = await firebase.auth().signInWithPopup(provider);
        TrailerAuth.setUser(cred.user.email, 'google');
        location.href = 'index.html';
      } catch (err) {
        showError(friendlyError(err.code));
      }
    });

    /* ── Guest ── */
    document.getElementById('browse-guest-login').addEventListener('click', () => {
      TrailerAuth.setGuest();
      location.href = 'index.html';
    });

    /* ── Redirect if already logged in ── */
    firebase.auth().onAuthStateChanged(user => {
      if (user) {
        TrailerAuth.setUser(user.email, user.providerData?.[0]?.providerId || 'email');
        location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
