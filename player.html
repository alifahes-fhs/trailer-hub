<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trailer Player</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0a0f;
      font-family: Arial, sans-serif;
    }
    .header {
      background: rgba(0,0,0,0.9);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
    }
    .logo {
      color: white;
      font-size: 20px;
      font-weight: bold;
      text-decoration: none;
    }
    .back-btn {
      color: white;
      text-decoration: none;
      background: rgba(255,255,255,0.2);
      padding: 8px 16px;
      border-radius: 20px;
    }
    .video-container {
      margin-top: 70px;
      width: 100%;
      background: black;
    }
    .video-wrapper {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      background: black;
    }
    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .info {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 20px;
      color: white;
    }
    .title {
      font-size: 28px;
      margin-bottom: 10px;
    }
    .meta {
      color: #aaa;
      margin-bottom: 15px;
    }
    .overview {
      line-height: 1.6;
      color: #ccc;
    }
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 16px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #6C63FF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .error {
      text-align: center;
      padding: 50px;
      color: #ff6b6b;
    }
    button {
      background: #6C63FF;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 25px;
      cursor: pointer;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="header">
    <a href="index.html" class="logo">TRAILER HUB</a>
    <a href="index.html" class="back-btn">← Back</a>
  </div>

  <div class="video-container">
    <div class="video-wrapper" id="videoWrapper">
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Loading trailer...</p>
      </div>
      <iframe id="player" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>
  </div>

  <div class="info" id="info">
    <h1 class="title" id="title">Loading...</h1>
    <div class="meta" id="meta"></div>
    <p class="overview" id="overview"></p>
  </div>

  <script>
    const API_KEY = 'afecc8075597c531e9aae083331172c6';
    const BASE_URL = 'https://api.themoviedb.org/3';
    
    const urlParams = new URLSearchParams(window.location.search);
    const mediaId = urlParams.get('id');
    const mediaType = urlParams.get('type') || 'movie';
    
    console.log('Player page loaded with ID:', mediaId, 'Type:', mediaType);
    
    async function loadVideo() {
      if (!mediaId) {
        document.getElementById('title').innerHTML = 'Error: No media selected';
        document.getElementById('loading').innerHTML = '<p>No video ID provided</p>';
        return;
      }
      
      try {
        // Get movie details
        const detailRes = await fetch(`${BASE_URL}/${mediaType}/${mediaId}?api_key=${API_KEY}&language=en-US`);
        const movie = await detailRes.json();
        
        const title = movie.title || movie.name;
        const year = (movie.release_date || movie.first_air_date || '').slice(0, 4);
        const rating = movie.vote_average ? `★ ${movie.vote_average.toFixed(1)}` : '';
        
        document.getElementById('title').innerHTML = title;
        document.getElementById('meta').innerHTML = `${year || 'Unknown'} ${rating ? '· ' + rating : ''} · ${mediaType === 'tv' ? 'TV Show' : 'Movie'}`;
        document.getElementById('overview').innerHTML = movie.overview || 'No description available.';
        
        // Get trailer
        const videoRes = await fetch(`${BASE_URL}/${mediaType}/${mediaId}/videos?api_key=${API_KEY}`);
        const videoData = await videoRes.json();
        const videos = videoData.results || [];
        
        const trailer = videos.find(v => v.site === 'YouTube' && v.type === 'Trailer') ||
                        videos.find(v => v.site === 'YouTube' && v.type === 'Teaser') ||
                        videos.find(v => v.site === 'YouTube');
        
        const loadingDiv = document.getElementById('loading');
        const player = document.getElementById('player');
        
        if (trailer) {
          console.log('Found trailer:', trailer.key);
          player.src = `https://www.youtube.com/embed/${trailer.key}?autoplay=1&rel=0`;
          player.style.display = 'block';
          loadingDiv.style.display = 'none';
        } else {
          loadingDiv.innerHTML = '<p>🎬 No trailer available for this title</p><button onclick="window.location.href=\'index.html\'">Browse Movies</button>';
        }
        
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('loading').innerHTML = '<p>⚠️ Could not load video</p><button onclick="window.location.href=\'index.html\'">Go Back</button>';
        document.getElementById('title').innerHTML = 'Error loading content';
      }
    }
    
    loadVideo();
  </script>
</body>
</html>
