<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trailer Hub — Discover Movies & TV</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6C63FF">
</head>
<body>

<header id="site-header">
  <a href="index.html" class="logo">TRAILER HUB</a>
  <nav>
    <a href="index.html" class="active">Discover</a>
    <a href="#trending">Trending</a>
    <button class="nav-list-btn" id="nav-watchlist-btn">
      Watchlist <span class="nav-badge zero" id="watchlist-count">0</span>
    </button>
    <button class="nav-list-btn" id="nav-watchlater-btn">
      Watch Later <span class="nav-badge zero" id="watchlater-count">0</span>
    </button>
    <button class="theme-toggle" id="theme-toggle">☀</button>
    <a href="contact.html" class="btn-pill">Contact</a>
  </nav>
</header>

<!-- FILTER BAR -->
<div id="sticky-filters" style="position:fixed;top:70px;left:0;right:0;z-index:190;background:#0a0a14;padding:10px 40px;">
  <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">

    <!-- GENRES -->
    <div class="genre-buttons">
      <button class="fchip active" data-genre="">🎬 All</button>
      <button class="fchip" data-genre="28">💥 Action</button>
      <button class="fchip" data-genre="35">😂 Comedy</button>
      <button class="fchip" data-genre="18">🎭 Drama</button>
      <button class="fchip" data-genre="27">👻 Horror</button>
      <button class="fchip" data-genre="878">🚀 Sci-Fi</button>
    </div>

    <!-- SEARCH -->
    <input type="text" id="movie-search" placeholder="Search movies or TV..." />

    <select id="search-type">
      <option value="movie">Movie</option>
      <option value="tv">TV Show</option>
    </select>

    <button id="search-btn">Search</button>

    <!-- FILTERS -->
    <select id="year-filter">
      <option value="">Year</option>
      <option value="2025">2025</option>
      <option value="2024">2024</option>
      <option value="2023">2023</option>
    </select>

    <select id="sort-filter">
      <option value="popularity.desc">🔥 Popular</option>
      <option value="vote_average.desc">⭐ Top Rated</option>
      <option value="release_date.desc">🆕 Newest</option>
    </select>

  </div>
</div>

<!-- HERO -->
<section class="hero">
  <div class="hero-inner">
    <h1>EVERY TRAILER. ONE HUB.</h1>
    <p>Search movies, filter by genre, year, rating.</p>
  </div>
</section>

<!-- RESULTS -->
<section class="results-section" id="results-section">
  <h2 id="results-heading">Results</h2>
  <div id="results-grid"></div>
</section>

<!-- TRENDING -->
<section class="trending-section" id="trending">
  <h2>TRENDING NOW</h2>
  <div id="trending-row"></div>
</section>

<script src="script.js"></script>
</body>
</html>
