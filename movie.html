<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie — Trailer Hub</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="responsive-fixes.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6C63FF">
</head>
<body>
  <header id="site-header">
    <a href="index.html" class="logo">TRAILER HUB</a>
    <nav>
      <a href="index.html">Discover</a>
      <button class="nav-list-btn" id="nav-watchlist-btn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 2h10a1 1 0 011 1v11l-5-3-5 3V3a1 1 0 011-1z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
        Watchlist <span class="nav-badge zero" id="watchlist-count">0</span>
      </button>
      <button class="nav-list-btn" id="nav-watchlater-btn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M8 5v3.5l2.5 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Watch Later <span class="nav-badge zero" id="watchlater-count">0</span>
      </button>
      <button class="theme-toggle" id="theme-toggle" title="Toggle theme"><span class="theme-icon">☀</span></button>
      <a href="contact.html" class="btn-pill">Contact</a>
    </nav>
  </header>

  <div id="movie-detail">
    <div class="detail-loading"><div class="modal-spinner" style="width:48px;height:48px;border-width:3px"></div></div>
  </div>

  <section id="similar-section" style="display:none; padding: 0 48px 80px;">
    <div class="section-header" data-reveal style="margin-bottom:28px">
      <div>
        <div class="section-eyebrow">You Might Like</div>
        <h2 class="section-title">SIMILAR</h2>
      </div>
    </div>
    <div id="similar-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px"></div>
  </section>

  <footer>
    <a href="index.html" class="logo">TRAILER HUB</a>
    <span class="footer-copy">© 2024 Trailer Hub. All rights reserved.</span>
    <div class="footer-links"><a href="contact.html">Contact</a></div>
  </footer>

  <!-- Inline Trailer Player -->
  <div id="inline-player-wrap" style="display:none">
    <div id="inline-player-box">
      <div id="inline-player-header">
        <div>
          <div id="inline-player-title"></div>
          <div id="inline-player-meta"></div>
        </div>
        <button id="inline-player-close">✕</button>
      </div>
      <div id="inline-player-video"></div>
      <div id="inline-player-actions"></div>
    </div>
  </div>

  <div class="panel-backdrop" id="list-panel">
    <div class="panel-box">
      <div class="panel-header">
        <div class="panel-tabs">
          <button class="panel-tab active" id="tab-watchlist">Watchlist</button>
          <button class="panel-tab" id="tab-watchlater">Watch Later</button>
        </div>
        <button class="modal-close" id="panel-close">✕</button>
      </div>
      <div class="panel-body" id="panel-body"></div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="https://trailer-hub-production.up.railway.app/socket.io/socket.io.js" onerror="console.warn('Watch Party server not running')"></script>
  <script src="script.js"></script>
  <script src="watch-party.js"></script>

  <!-- WATCH WITH ME MODAL -->
  <div id="wwm-modal-backdrop" role="dialog" aria-modal="true">
    <div id="wwm-modal">
      <button class="wwm-close" id="wwm-modal-close" title="Close">&#x2715;</button>
      <div class="wwm-icon-wrap">&#x1F3AC;</div>
      <div class="wwm-title">WATCH WITH ME</div>
      <div class="wwm-movie-name" id="wwm-movie-name">Movie Title</div>
      <div class="wwm-divider"></div>
      <div class="wwm-label">Your Room Link</div>
      <div class="wwm-link-row">
        <input type="text" id="wwm-room-link" readonly aria-label="Room link">
        <button class="wwm-copy-btn" id="wwm-copy-btn">Copy</button>
      </div>
      <div class="wwm-share-note">
        Share this link with friends. They open it on any device and join the same room instantly &mdash; no account needed.
      </div>
      <div class="wwm-actions">
        <button class="wwm-action-btn primary" id="wwm-open-btn">&#x25B6; Open Room</button>
        <button class="wwm-action-btn secondary" id="wwm-share-btn">&#x2197; Share Link</button>
      </div>
    </div>
  </div>

  <!-- WATCH PARTY STATUS BAR (shown when inside a room) -->
  <div id="wwm-status-bar">
    <div class="wwm-bar-left">
      <div class="wwm-bar-dot"></div>
      <span style="font-weight:600;font-size:13px;color:var(--text)">Watch Party</span>
      <span class="wwm-bar-room" id="wwm-bar-room-id"></span>
      <span class="wwm-bar-users" id="wwm-bar-users">&#x1F465; 1 watching</span>
    </div>
    <div class="wwm-bar-right">
      <button class="wwm-bar-btn copy" id="wwm-bar-copy">&#x1F517; Copy Link</button>
      <button class="wwm-bar-btn leave" id="wwm-bar-leave">Leave</button>
    </div>
  </div>

  <script>
  /* ============================================================
     WATCH WITH ME — Full Logic (modal + room + status bar)
  ============================================================ */
  (function () {
    /* --- helpers --- */
    function genRoomId() {
      var c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      var id = '';
      for (var i = 0; i < 8; i++) id += c[Math.floor(Math.random() * c.length)];
      return id;
    }
    function getRoomFromURL() {
      return new URLSearchParams(window.location.search).get('room');
    }
    function buildRoomLink(roomId) {
      var url = new URL(window.location.href);
      url.searchParams.set('room', roomId);
      url.hash = '';
      return url.toString();
    }

    /* --- modal elements --- */
    var backdrop    = document.getElementById('wwm-modal-backdrop');
    var closeBtn    = document.getElementById('wwm-modal-close');
    var movieNameEl = document.getElementById('wwm-movie-name');
    var roomLinkEl  = document.getElementById('wwm-room-link');
    var copyBtn     = document.getElementById('wwm-copy-btn');
    var openBtn     = document.getElementById('wwm-open-btn');
    var shareBtn    = document.getElementById('wwm-share-btn');

    /* --- status bar elements --- */
    var statusBar    = document.getElementById('wwm-status-bar');
    var barRoomId    = document.getElementById('wwm-bar-room-id');
    var barUsers     = document.getElementById('wwm-bar-users');
    var barCopyBtn   = document.getElementById('wwm-bar-copy');
    var barLeaveBtn  = document.getElementById('wwm-bar-leave');

    /* --- open modal --- */
    function openWWM(title) {
      var roomId = genRoomId();
      var link = buildRoomLink(roomId);
      if (movieNameEl) movieNameEl.textContent = title || 'This Movie';
      if (roomLinkEl)  roomLinkEl.value = link;
      if (backdrop)    backdrop.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    /* --- close modal --- */
    function closeWWM() {
      if (backdrop) backdrop.classList.remove('open');
      document.body.style.overflow = '';
    }

    window.openWatchWithMe = openWWM;
    if (closeBtn) closeBtn.addEventListener('click', closeWWM);
    if (backdrop) backdrop.addEventListener('click', function(e) { if (e.target === backdrop) closeWWM(); });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeWWM(); });

    /* --- copy link inside modal --- */
    if (copyBtn) {
      copyBtn.addEventListener('click', function() {
        var val = roomLinkEl ? roomLinkEl.value : '';
        if (!val) return;
        function done() { copyBtn.textContent = 'Copied!'; copyBtn.classList.add('copied'); setTimeout(function() { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied'); }, 2200); }
        if (navigator.clipboard) { navigator.clipboard.writeText(val).then(done); }
        else { try { roomLinkEl.select(); document.execCommand('copy'); done(); } catch(e){} }
      });
    }

    /* --- Open Room button: navigates INTO the room (same tab) ---
         watch-party.js will detect ?room= in URL and connect socket */
    if (openBtn) {
      openBtn.addEventListener('click', function() {
        var link = roomLinkEl ? roomLinkEl.value : '';
        if (!link) return;
        /* navigate — watch-party.js picks up ?room= on load */
        window.location.href = link;
      });
    }

    /* --- Share button --- */
    if (shareBtn) {
      shareBtn.addEventListener('click', function() {
        var link = roomLinkEl ? roomLinkEl.value : '';
        var title = movieNameEl ? movieNameEl.textContent : 'a movie';
        if (navigator.share) {
          navigator.share({ title: 'Watch ' + title + ' with me on Trailer Hub!', url: link }).catch(function(){});
        } else {
          if (navigator.clipboard) navigator.clipboard.writeText(link);
          shareBtn.innerHTML = '&#x2713; Copied!';
          setTimeout(function() { shareBtn.innerHTML = '&#x2197; Share Link'; }, 2200);
        }
      });
    }

    /* --- Status bar: show if we are already in a room --- */
    var currentRoom = getRoomFromURL();
    if (currentRoom && statusBar) {
      statusBar.classList.add('active');
      document.body.classList.add('has-watch-party');
      if (barRoomId) barRoomId.textContent = 'Room: ' + currentRoom;
    }

    if (barCopyBtn) {
      barCopyBtn.addEventListener('click', function() {
        var link = window.location.href;
        if (navigator.clipboard) {
          navigator.clipboard.writeText(link).then(function() {
            barCopyBtn.textContent = 'Copied!';
            setTimeout(function() { barCopyBtn.innerHTML = '&#x1F517; Copy Link'; }, 2000);
          });
        }
      });
    }
    if (barLeaveBtn) {
      barLeaveBtn.addEventListener('click', function() {
        /* Remove ?room param and navigate away */
        var url = new URL(window.location.href);
        url.searchParams.delete('room');
        window.location.href = url.toString();
      });
    }

    /* Update user count from WatchParty if available */
    function updateBarUsers() {
      if (window.WatchParty && barUsers) {
        /* WatchParty exposes userCount via event or we poll */
        var count = window._wpUserCount || 1;
        barUsers.textContent = '\u1F465 ' + count + ' watching';
      }
    }
    setInterval(updateBarUsers, 3000);
  })();

  /* ============================================================
     INLINE PLAYER FULLSCREEN
  ============================================================ */
  (function () {
    function inject() {
      var actions = document.getElementById('inline-player-actions');
      if (!actions || document.getElementById('inline-player-fullscreen-btn')) return;
      var btn = document.createElement('button');
      btn.id = 'inline-player-fullscreen-btn';
      btn.textContent = '\u26F6 Fullscreen';
      btn.addEventListener('click', function () {
        var target = document.getElementById('inline-player-wrap') || document.getElementById('inline-player-video');
        if (!target) return;
        if (document.fullscreenElement) {
          document.exitFullscreen && document.exitFullscreen();
        } else {
          (target.requestFullscreen || target.webkitRequestFullscreen || function(){}).call(target);
        }
      });
      actions.appendChild(btn);
    }
    var wrap = document.getElementById('inline-player-wrap');
    if (wrap) {
      new MutationObserver(function() {
        if (wrap.classList.contains('open') || wrap.style.display !== 'none') inject();
      }).observe(wrap, { attributes: true, attributeFilter: ['class','style'] });
    }
    document.addEventListener('fullscreenchange', function() {
      var btn = document.getElementById('inline-player-fullscreen-btn');
      if (btn) btn.textContent = document.fullscreenElement ? '\u2715 Exit Full' : '\u26F6 Fullscreen';
    });
  })();
  </script>
</body>
</html>
